name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503,E221,E272,E127,E402

      - name: Run feature engineering tests
        run: |
          pytest tests/test_features.py -v --tb=short

      - name: Run prediction tests (skipped if models absent)
        run: |
          pytest tests/test_predict.py -v --tb=short

      - name: Generate coverage report
        run: |
          pytest tests/test_features.py \
            --cov=credit_risk \
            --cov-omit=src/credit_risk/predict.py \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: credit-risk-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
